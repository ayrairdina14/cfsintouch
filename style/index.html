<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Cat World</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<nav>
    <h1>🐱 Cat World</h1>
    <ul>
        <li><a onclick="showPage('home')">Home</a></li>
        <li><a onclick="showPage('gallery')">Gallery</a></li>
        <li><a onclick="showPage('facts')">Fun Facts</a></li>
    </ul>
</nav>

<!-- HOME -->
<section id="home" class="active">
    <h2>Welcome to Cat World</h2>
    <p>Cats are cute, playful, and loving animals!</p>
    <button onclick="showMessage()">Why cats?</button>
</section>

<!-- GALLERY -->
<section id="gallery">
    <h2>Cat Gallery</h2>
    <img src="https://placekitten.com/200/200">
    <img src="https://placekitten.com/201/200">
    <img src="https://placekitten.com/200/201">
</section>

<!-- FACTS -->
<section id="facts">
    <h2>Fun Cat Facts</h2>
    <p id="factText">Click the button to learn a fact!</p>
    <button onclick="newFact()">Show Fact</button>
</section>

<script src="script.js"></script>
</body>
</html>
